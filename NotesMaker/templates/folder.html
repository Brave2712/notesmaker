<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{folder}} Notes</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <nav>

        <div class="menu">
    <a href="/">Home</a>
    <button id="themeToggle">🌙 Dark</button>
</div>

    </nav>

    <section class="folder-header">

        <h1>{{folder}} Notes</h1>

        <h2>Total Files: {{ files|length }}</h2>

        <p>
            All available notes for {{folder}}
        </p>

    </section>

    <section class="notes-container">

        {% if files %}

            {% for file in files %}

            <div class="note-card">

                <div>

                    <h3>{{file}}</h3>

                </div>

                <div class="buttons">

                    <a
                       class="view-btn"
                       href="/file/{{folder}}/{{file}}"
                       target="_blank">

                        View

                    </a>

                    <a
                       class="download-btn"
                       href="/file/{{folder}}/{{file}}"
                       download>

                        Download

                    </a>

                </div>

            </div>

            {% endfor %}

        {% else %}

            <h2>No PDFs Found</h2>

        {% endif %}

    </section>

<script src="theme.js"></script>

</body>

</html>
